 \\ge 0$,\n$$a_{n+1} = \\begin{cases} \na_n + n, \\,\\,\\,\\, if \\,\\,\\,\\, a_n \\le  n \\\\\na_n - n, \\,\\,\\,\\, otherwise \\end{cases}$$\nLet $k$ be the number of integers such that $a_k < k \\le 3^{2020}$. Find $2k + 2$.\n\n\nPS. You should use hide for answers.  Collected [url=https://artofproblemsolving.com/community/c5h2760506p24143309]here[/url]."
